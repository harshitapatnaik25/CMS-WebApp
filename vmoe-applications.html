<!-- CMS-SUITE/vmoe-applications.html -->
<div class="accordion-group">
  <div class="accordion-header" id="headingVMOE">
    <h5 class="mb-0">
      <button class="custom-accordion-button" type="button" data-target="#collapseVMOE">
        VMOE APPLICATIONS
      </button>
    </h5>
  </div>
  <div id="collapseVMOE" class="accordion-content">
    <div class="accordion-body">
      <div class="custom-accordion">
        <!-- JSON containers for each app -->
        <div id="VMOE_linksJsonContainer"></div>
        <div id="banjoJsonContainer"></div>
        <div id="vmohubJsonContainer"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const vmoeApps = [
    { file: 'VMOE_links', key: 'VMOE LINKS' },
    { file: 'banjo', key: 'BANJO' },
    { file: 'vmohub', key: 'VMOHUB' }
  ];

  vmoeApps.forEach(({ file, key }) => {
    const containerId = `${file.replace(/[^\w]/g, '_')}JsonContainer`;
    loadJsonAccordion({
      url: `VMOE/${file}.json`,
      containerId,
      rootKey: key
    });
  });

  if (typeof initializeAccordionListeners === 'function') {
    initializeAccordionListeners();
  }
</script>
